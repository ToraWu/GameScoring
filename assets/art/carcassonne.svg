<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7d7b4"/>
      <stop offset="0.6" stop-color="#ecc98f"/>
      <stop offset="1" stop-color="#e7b56e"/>
    </linearGradient>
    <linearGradient id="groundC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdb07a"/>
      <stop offset="1" stop-color="#b8995f"/>
    </linearGradient>
    <linearGradient id="wallC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c79a5e"/>
      <stop offset="1" stop-color="#a87f49"/>
    </linearGradient>
    <linearGradient id="towerC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5612b"/>
      <stop offset="1" stop-color="#7e451b"/>
    </linearGradient>
    <radialGradient id="sunC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbe6ad"/>
      <stop offset="1" stop-color="#eeb863"/>
    </radialGradient>
    <radialGradient id="vignC" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#37230c" stop-opacity="0.36"/>
    </radialGradient>
    <filter id="softC" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="grainC" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- Sky + sun glow -->
  <rect width="600" height="420" fill="url(#skyC)"/>
  <circle cx="300" cy="120" r="120" fill="#f4d491" opacity="0.35" filter="url(#softC)"/>
  <circle cx="300" cy="96" r="40" fill="url(#sunC)" opacity="0.85"/>

  <!-- Rolling ground -->
  <path d="M0 300 Q 300 270 600 300 V420 H0 Z" fill="url(#groundC)"/>
  <!-- Castle shadow -->
  <ellipse cx="300" cy="320" rx="220" ry="18" fill="#3a230c" opacity="0.25" filter="url(#softC)"/>

  <!-- Wall -->
  <rect x="150" y="214" width="300" height="98" fill="url(#wallC)"/>
  <g fill="#b88f53">
    <rect x="150" y="200" width="26" height="18"/>
    <rect x="202" y="200" width="26" height="18"/>
    <rect x="254" y="200" width="26" height="18"/>
    <rect x="306" y="200" width="26" height="18"/>
    <rect x="358" y="200" width="26" height="18"/>
    <rect x="410" y="200" width="26" height="18"/>
  </g>
  <rect x="150" y="214" width="300" height="10" fill="#ffffff" opacity="0.12"/>
  <!-- Gate -->
  <path d="M276 312 v-46 a24 24 0 0 1 48 0 v46 z" fill="#5a3c1f"/>
  <path d="M276 312 v-46 a24 24 0 0 1 24 0 v46 z" fill="#6a4824" opacity="0.6"/>

  <!-- Towers -->
  <g>
    <rect x="120" y="150" width="62" height="162" fill="url(#towerC)"/>
    <rect x="418" y="150" width="62" height="162" fill="url(#towerC)"/>
    <rect x="120" y="150" width="14" height="162" fill="#ffffff" opacity="0.1"/>
    <rect x="418" y="150" width="14" height="162" fill="#ffffff" opacity="0.1"/>
  </g>
  <g fill="#8a4f1f">
    <rect x="120" y="136" width="18" height="18"/><rect x="143" y="136" width="18" height="18"/><rect x="166" y="136" width="16" height="18"/>
    <rect x="418" y="136" width="18" height="18"/><rect x="441" y="136" width="18" height="18"/><rect x="464" y="136" width="16" height="18"/>
  </g>
  <g fill="#3a230c" opacity="0.75">
    <rect x="143" y="184" width="16" height="28" rx="6"/>
    <rect x="441" y="184" width="16" height="28" rx="6"/>
  </g>

  <!-- Pennants -->
  <g>
    <line x1="151" y1="136" x2="151" y2="102" stroke="#5a3c1f" stroke-width="4"/>
    <polygon points="151,104 188,115 151,126" fill="#b45309"/>
    <line x1="449" y1="136" x2="449" y2="102" stroke="#5a3c1f" stroke-width="4"/>
    <polygon points="449,104 412,115 449,126" fill="#b45309"/>
  </g>

  <!-- Grain + vignette -->
  <rect width="600" height="420" filter="url(#grainC)" opacity="0.5"/>
  <rect width="600" height="420" fill="url(#vignC)"/>
</svg>
