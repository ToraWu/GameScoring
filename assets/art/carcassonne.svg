<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm stone scene -->
  <rect width="600" height="420" fill="#f1e4cd"/>
  <rect y="300" width="600" height="120" fill="#cdb98f"/>

  <!-- Castle wall -->
  <rect x="150" y="210" width="300" height="100" fill="#b98c55"/>
  <!-- Battlements -->
  <g fill="#b98c55">
    <rect x="150" y="196" width="26" height="20"/>
    <rect x="202" y="196" width="26" height="20"/>
    <rect x="254" y="196" width="26" height="20"/>
    <rect x="306" y="196" width="26" height="20"/>
    <rect x="358" y="196" width="26" height="20"/>
    <rect x="410" y="196" width="26" height="20"/>
  </g>
  <!-- Gate -->
  <path d="M276 310 v-46 a24 24 0 0 1 48 0 v46 z" fill="#6b4a26"/>

  <!-- Towers -->
  <g fill="#92400e">
    <rect x="120" y="150" width="64" height="160"/>
    <rect x="416" y="150" width="64" height="160"/>
  </g>
  <!-- Tower battlements -->
  <g fill="#92400e">
    <rect x="120" y="136" width="18" height="18"/>
    <rect x="143" y="136" width="18" height="18"/>
    <rect x="166" y="136" width="18" height="18"/>
    <rect x="416" y="136" width="18" height="18"/>
    <rect x="439" y="136" width="18" height="18"/>
    <rect x="462" y="136" width="18" height="18"/>
  </g>
  <!-- Tower windows -->
  <g fill="#f1e4cd">
    <rect x="144" y="186" width="16" height="26" rx="6"/>
    <rect x="440" y="186" width="16" height="26" rx="6"/>
  </g>

  <!-- Pennants -->
  <g>
    <line x1="152" y1="136" x2="152" y2="104" stroke="#6b4a26" stroke-width="4"/>
    <polygon points="152,106 186,116 152,126" fill="#b45309"/>
    <line x1="448" y1="136" x2="448" y2="104" stroke="#6b4a26" stroke-width="4"/>
    <polygon points="448,106 414,116 448,126" fill="#b45309"/>
  </g>
</svg>
