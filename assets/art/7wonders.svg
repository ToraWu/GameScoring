<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sunset sky -->
    <linearGradient id="sky7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c98c"/>
      <stop offset="0.55" stop-color="#e6b46a"/>
      <stop offset="1" stop-color="#e59a52"/>
    </linearGradient>
    <radialGradient id="sun7" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fce8b6"/>
      <stop offset="0.6" stop-color="#f4c873"/>
      <stop offset="1" stop-color="#eaa84d"/>
    </radialGradient>
    <linearGradient id="sand7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b274"/>
      <stop offset="1" stop-color="#c79a59"/>
    </linearGradient>
    <linearGradient id="pyrLit" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#cf8d4a"/>
      <stop offset="1" stop-color="#b3702f"/>
    </linearGradient>
    <linearGradient id="pyrShade" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#90531f"/>
      <stop offset="1" stop-color="#6f3d15"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a1f08" stop-opacity="0.38"/>
    </radialGradient>
    <filter id="soft7" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="grain7" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="600" height="420" fill="url(#sky7)"/>

  <!-- Sun glow + disc -->
  <circle cx="430" cy="150" r="120" fill="#f6cf85" opacity="0.45" filter="url(#soft7)"/>
  <circle cx="430" cy="150" r="64" fill="url(#sun7)"/>

  <!-- Distant dune -->
  <path d="M0 250 Q 180 215 360 245 T 600 240 V420 H0 Z" fill="#dcb877" opacity="0.7"/>

  <!-- Pyramid shadows -->
  <ellipse cx="300" cy="322" rx="180" ry="20" fill="#5c3414" opacity="0.28" filter="url(#soft7)"/>

  <!-- Back pyramid -->
  <polygon points="160,140 60,320 260,320" fill="#9c6531" opacity="0.85"/>
  <!-- Great pyramid, two faces -->
  <polygon points="320,96 320,320 150,320" fill="url(#pyrLit)"/>
  <polygon points="320,96 320,320 490,320" fill="url(#pyrShade)"/>
  <!-- Capstone -->
  <polygon points="320,96 300,132 340,132" fill="#f4d488"/>

  <!-- Foreground sand -->
  <path d="M0 312 Q 200 296 420 314 T 600 312 V420 H0 Z" fill="url(#sand7)"/>

  <!-- Columns, weathered -->
  <g fill="#e7d3a8" opacity="0.92">
    <rect x="44" y="196" width="34" height="120" rx="3"/>
    <rect x="36" y="186" width="50" height="14" rx="4"/>
    <rect x="522" y="196" width="34" height="120" rx="3"/>
    <rect x="514" y="186" width="50" height="14" rx="4"/>
  </g>
  <g fill="#3a1f08" opacity="0.12">
    <rect x="62" y="196" width="16" height="120"/>
    <rect x="540" y="196" width="16" height="120"/>
  </g>

  <!-- Grain + vignette -->
  <rect width="600" height="420" filter="url(#grain7)" opacity="0.5"/>
  <rect width="600" height="420" fill="url(#vign)"/>
</svg>
